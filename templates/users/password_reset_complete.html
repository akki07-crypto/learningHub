{% extends 'base.html' %}

{% block title %}Password Changed Successfully - LearnHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5 text-center">
                <div class="fs-1 text-success mb-3"><i class="fa-solid fa-circle-check"></i></div>
                <h3 class="fw-bold text-theme-primary mb-2">Password Reset Complete</h3>
                <p class="text-theme-secondary small mb-4">Your password has been set successfully! You may now log in with your new password.</p>
                
                <a href="{% url 'login' %}" class="btn btn-gradient px-5 py-2 fs-6 rounded-pill">Login Now 🔐</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
