{% extends 'base.html' %}

{% block title %}Reset Password - LearnHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="fs-1 text-primary mb-2"><i class="fa-solid fa-key"></i></div>
                    <h3 class="fw-bold text-theme-primary">Forgot Your Password?</h3>
                    <p class="text-theme-secondary small m-0">Enter your registered email address below and we will send you password reset instructions.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-theme-primary">Email Address *</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your registered email..." required autocomplete="email">
                    </div>

                    <button type="submit" class="btn btn-gradient w-100 py-2 fs-6">Send Reset Instructions 📧</button>
                </form>

                <div class="text-center mt-4 border-top border-secondary pt-3">
                    <span class="text-theme-secondary small">Remembered your password? <a href="{% url 'login' %}" class="fw-bold text-primary">Login here</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
