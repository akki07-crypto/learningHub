<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate of Achievement - {{ cert.user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #1e293b;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 0;
        }

        .cert-container {
            width: 900px;
            height: 620px;
            margin: 0 auto;
            background: #ffffff;
            border: 12px solid #6366f1;
            padding: 40px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-image: radial-gradient(circle, rgba(99, 102, 241, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .cert-border-inner {
            border: 2px solid #cbd5e1;
            height: 100%;
            padding: 30px;
            text-center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cert-title {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #4338ca;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cert-name {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            border-bottom: 2px solid #6366f1;
            display: inline-block;
            padding-bottom: 5px;
        }

        .cert-seal {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
            margin: 0 auto;
        }

        @media print {
            body { background: white; padding: 0; }
            .btn-print { display: none; }
            .cert-container { box-shadow: none; margin: 0; width: 100%; height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="text-center mb-4 btn-print">
        <button onclick="window.print()" class="btn btn-primary btn-lg shadow-lg px-4 rounded-pill">
            🖨️ Print / Save as PDF Certificate
        </button>
    </div>

    <div class="cert-container">
        <div class="cert-border-inner">
            <div class="text-center">
                <h4 class="text-uppercase text-muted fw-bold mb-1" style="letter-spacing: 3px; font-size: 0.9rem;">LearnHub Skill Exchange Ecosystem</h4>
                <h1 class="cert-title mb-2">Certificate of Achievement</h1>
                <p class="text-muted italic small">This official certificate is proudly awarded to</p>
            </div>

            <div class="text-center my-3">
                <h2 class="cert-name">{{ cert.user.username }}</h2>
                <p class="mt-3 text-secondary lead mb-0">For successfully completing</p>
                <h4 class="fw-bold text-dark mt-1">{{ cert.title }}</h4>
            </div>

            <div class="row align-items-center mt-4">
                <div class="col-4 text-start">
                    <span class="d-block small text-muted">Issue Date</span>
                    <strong class="text-dark">{{ cert.issue_date|date:"F d, Y" }}</strong>
                </div>
                <div class="col-4 text-center">
                    <div class="cert-seal">
                        Official<br>Verified
                    </div>
                </div>
                <div class="col-4 text-end">
                    <span class="d-block small text-muted">Verification Code</span>
                    <strong class="text-dark font-monospace" style="font-size: 0.85rem;">{{ cert.certificate_code }}</strong>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
