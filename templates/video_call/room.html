{% extends 'base.html' %}

{% block title %}Live Jitsi Video Call - Room: {{ room_name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="glass-card p-3 mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
            <h4 class="fw-bold m-0"><i class="fa-solid fa-video text-success me-2"></i> Jitsi Live Video Call Room</h4>
            <span class="text-muted small">Room Name: <strong>{{ room_name }}</strong></span>
        </div>
        <a href="{% url 'booking_calendar' %}" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-arrow-left me-1"></i> Back to Bookings</a>
    </div>

    <!-- Jitsi Container -->
    <div class="glass-card p-2 overflow-hidden shadow-lg" style="height: 75vh;">
        <div id="jitsi-container" style="width: 100%; height: 100%; border-radius: 12px; overflow: hidden;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Jitsi External API Script -->
<script src="https://meet.jit.si/external_api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const domain = "meet.jit.si";
        const options = {
            roomName: "{{ room_name }}",
            width: "100%",
            height: "100%",
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                displayName: "{{ display_name }}"
            },
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                    'fravatar', 'hangup', 'chat', 'recording',
                    'raisehand', 'videoquality', 'filmstrip', 'tileview'
                ]
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
    });
</script>
{% endblock %}
